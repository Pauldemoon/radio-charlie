<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Sillage FM génère un podcast musical intelligent à partir d'un morceau."
    >
    <title>Sillage FM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app">
      <section id="home-screen" class="screen screen--active" aria-label="Accueil">
        <div class="hero">
          <div class="hero-copy">
            <h1 class="brand-logo brand-logo--home">
              <img class="brand-logo-image" src="./assets/sillage-logo-cutout.png" alt="Sillage">
            </h1>
            <p class="station-line">Au-delà du son</p>
          </div>

          <form id="search-form" class="search" autocomplete="off">
            <input
              id="search-input"
              type="search"
              name="query"
              placeholder="Rechercher un morceau…"
              aria-label="Rechercher un morceau"
            >
            <button type="submit">Rechercher</button>
          </form>
          <p id="search-message" class="message" role="status" aria-live="polite"></p>
        </div>

        <div id="results" class="results" aria-label="Résultats Deezer"></div>
      </section>

      <section id="loading-screen" class="screen loading-screen" aria-label="Chargement">
        <div class="fm-loader" role="status" aria-live="polite" aria-label="Sillage FM cherche">
          <span class="fm-loader__letters">FM</span>
          <span class="fm-loader__needle" aria-hidden="true"></span>
          <span class="fm-loader__wave fm-loader__wave--one" aria-hidden="true"></span>
          <span class="fm-loader__wave fm-loader__wave--two" aria-hidden="true"></span>
          <span class="fm-loader__wave fm-loader__wave--three" aria-hidden="true"></span>
        </div>
        <p id="loading-message" class="loading-message sr-only" role="status" aria-live="polite">
          Recherche en cours.
        </p>
      </section>

      <section id="radio-screen" class="screen radio-screen" aria-label="Podcast">
        <header class="radio-header">
          <div>
            <p class="brand-logo brand-logo--compact" aria-label="Sillage FM">
              <img class="brand-logo-image" src="./assets/sillage-logo-cutout.png" alt="Sillage FM">
            </p>
            <h2 id="radio-title">Podcast</h2>
          </div>
          <div class="radio-actions">
            <button id="pause-button" class="secondary-button" type="button" disabled aria-pressed="false">
              Pause
            </button>
            <button id="audio-unlock-button" class="primary-button" type="button" hidden>
              Activer le son
            </button>
            <button id="skip-button" class="secondary-button" type="button">Passer</button>
            <button id="stop-button" class="danger-button" type="button">Arrêter le podcast</button>
          </div>
        </header>

        <section class="now">
          <div class="cover-frame">
            <img id="current-cover" class="cover" src="" alt="">
            <div class="meter" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <div class="now-copy">
            <div class="meta-row">
              <span id="progress" class="progress">1 / 6</span>
              <span id="playback-state" class="state">Sillage raconte…</span>
            </div>
            <div class="track-card">
              <p id="current-artist" class="artist"></p>
              <h3 id="current-title"></h3>
              <p id="current-role" class="role"></p>
              <a id="current-link" class="deezer-link" href="#" target="_blank" rel="noreferrer" hidden>
                Ouvrir sur Deezer
              </a>
            </div>
          </div>
        </section>

        <ol id="queue" class="queue" aria-label="Playlist du podcast"></ol>
      </section>

      <section id="end-screen" class="screen end-screen" aria-label="Fin">
        <p class="brand-logo brand-logo--status" aria-label="Sillage FM">
          <img class="brand-logo-image" src="./assets/sillage-logo-cutout.png" alt="Sillage FM">
        </p>
        <h2>Fin du podcast.</h2>
        <button id="restart-button" class="primary-button" type="button">
          Relancer avec un autre morceau
        </button>
      </section>

      <section id="error-screen" class="screen error-screen" aria-label="Erreur">
        <p class="brand-logo brand-logo--status" aria-label="Sillage FM">
          <img class="brand-logo-image" src="./assets/sillage-logo-cutout.png" alt="Sillage FM">
        </p>
        <h2>Quelque chose a mal tourné.</h2>
        <p id="error-message" class="error-detail"></p>
        <div class="error-actions">
          <button id="error-retry-button" class="primary-button" type="button">
            Réessayer
          </button>
          <button id="error-home-button" class="secondary-button" type="button">
            Nouvelle recherche
          </button>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
